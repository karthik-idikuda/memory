[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "sigmax-core"
version = "1.0.0"
description = "SIGMA-X Omega — Persistent Causal Reasoning Engine"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"

[project.optional-dependencies]
dev = ["pytest>=7.0"]
server = ["fastapi>=0.100.0", "uvicorn>=0.20.0"]

[tool.setuptools.packages.find]
include = ["sigmax*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
